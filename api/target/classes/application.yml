# 服务配置
server:
  port: 21090
  servlet:
    context-path: /api/v1.0/house-rental-api
# API地址前缀，用于接口拦截放行
my-server:
  api-context-path: /api/v1.0/house-rental-api
#MySQL与文件上传限制配置
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/house-rental?characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: root
# Mybatis Plus配置
mybatis-plus:
  configuration:
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启日志
    map-underscore-to-camel-case: true # 开启驼峰命名
  global-config:
    db-config:
      id-type: auto # 主键策略
  mapper-locations: classpath*:/mapper/**/*.xml # mapper文件位置

alipay:
  app-id: ${ALIPAY_APP_ID:9021000162607038}
  private-key: ${ALIPAY_PRIVATE_KEY:}
  public-key: ${ALIPAY_PUBLIC_KEY:}
  gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  notify-url: ${ALIPAY_NOTIFY_URL:http://ee2d7d64.natappfree.cc/api/v1.0/house-rental-api/payment-order/notify}
  return-url: ${ALIPAY_RETURN_URL:http://localhost:21091/payment-result}
  charset: UTF-8
  sign-type: RSA2
  format: json


